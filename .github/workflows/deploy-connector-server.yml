name: CI/CD Connector Server

on:
  push:
    branches: [master]
    paths:
      - "connector/server/**"
      - "scripts/server_deploy_step.ps1"
      - ".github/workflows/deploy-connector-server.yml"
  pull_request:
    paths:
      - "connector/server/**"
      - ".github/workflows/deploy-connector-server.yml"
  workflow_dispatch:

# Один деплой за раз; не отменять текущий если пришёл новый push.
concurrency:
  group: deploy-connector-server
  cancel-in-progress: false

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: connector/server/requirements-dev.txt

      - name: Install dependencies
        working-directory: connector/server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: connector/server
        run: pytest -v

  deploy:
    name: Pull + migrate + restart
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    # Деплой только на push в master или ручном dispatch — не на PR.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Run remote deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 8m
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -File C:\Connector\src\scripts\server_deploy_step.ps1 -CommitSha "${{ github.sha }}"
